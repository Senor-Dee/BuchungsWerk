name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Vitest (Unit)
        run: npm run test

      - name: Prepare build output directory
        # vite.config.js setzt outDir auf "../buchungswerk-backend/app" (Pi-Struktur)
        # In CI liegt der Checkout eine Ebene tiefer → Zielordner muss existieren
        run: mkdir -p ../buchungswerk-backend/app

      - name: Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npx playwright test --project=chromium

      - name: Upload Playwright Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
